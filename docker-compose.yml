
# Postgres local para desarrollo (misma major version que Neon).
# Uso: docker compose up -d   ·   parar: docker compose down
# Los datos persisten en el volumen "faahro-pgdata" entre reinicios.
services:
  db:
    image: postgres:17
    container_name: faahro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: faahro
      POSTGRES_PASSWORD: faahro
      POSTGRES_DB: faahro
    ports:
      - "5432:5432"
    volumes:
      - faahro-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faahro -d faahro"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  faahro-pgdata:
